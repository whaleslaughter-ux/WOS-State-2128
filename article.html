  <style>
    :root {
      --bg1: #0b1030;
      --bg2: #1a2147;
      --ink: #eef2ff;
      --muted: #b9c3ff;
      --gold: #d4b06a;
      --accent: #a5b4ff;
      --border: rgba(255,255,255,.08);
      --card-bg: linear-gradient(180deg,rgba(255,255,255,.02),rgba(0,0,0,.04));
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: radial-gradient(1100px 560px at 50% -10%, var(--bg2) 0%, var(--bg1) 42%, #060915 100%);
      font: 16px/1.7 ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, Roboto, "Noto Sans", Arial;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: underline; }
    a:hover { color: #fff; text-decoration: none; }
    .skip-link {
      position: absolute; top: -50px; left: 10px;
      background: var(--bg1); color: var(--ink);
      padding: 10px 14px; border: 2px solid var(--accent);
      border-radius: 8px; font-weight: 700; font-size: .875rem;
      z-index: 9999; text-decoration: none; transition: top .15s;
    }
    .skip-link:focus { top: 10px; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 28px 20px 60px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .82rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted);
      text-decoration: none; margin-bottom: 28px; transition: color .15s;
    }
    .back-link:hover { color: var(--ink); text-decoration: none; }
    .back-link::before { content: "←"; font-size: 1rem; }
    .article-hero {
      width: 100%; max-height: 480px; object-fit: cover;
      border-radius: 14px; display: block; background: #000; margin-bottom: 28px;
    }
    .article-header { margin-bottom: 24px; }
    .article-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tag {
      font-size: .68rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 999px;
      background: rgba(165,180,255,.12); color: var(--muted);
      border: 1px solid rgba(165,180,255,.2);
    }
    .tag.alliance {
      background: rgba(212,176,106,.12); color: var(--gold);
      border-color: rgba(212,176,106,.25);
    }
    .article-title {
      font-size: clamp(1.5rem,4vw,2.2rem); font-weight: 900;
      line-height: 1.2; margin: 0 0 16px; color: #fff;
    }
    .article-byline {
      display: flex; align-items: center; gap: 10px;
      font-size: .82rem; color: var(--muted); flex-wrap: wrap;
    }
    .article-byline .reporter { font-weight: 700; color: var(--gold); }
    .article-byline .sep { opacity: .4; }
    .article-body { font-size: 1.05rem; line-height: 1.8; color: var(--ink); margin-bottom: 40px; }
    .article-body p { margin: 0 0 1.2em; }
    .article-body a { color: var(--accent); }
    .article-body a:hover { color: #fff; }

    /* === Share button === */
    .share-wrap { margin-bottom: 40px; }
    .share-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 8px;
      border: 1px solid rgba(165,180,255,.25);
      background: rgba(165,180,255,.06);
      color: var(--ink); font-size: .88rem; font-weight: 700;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .share-btn:hover { background: rgba(165,180,255,.14); border-color: rgba(165,180,255,.4); color: #fff; }
    .share-btn.copied { color: #86efac; border-color: rgba(134,239,172,.3); }

    /* === Comments === */
    .comments-section {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px; margin-bottom: 40px;
    }
    .section-heading {
      font-size: .72rem; font-weight: 800; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted); margin: 0 0 20px;
    }
    .comment-login { margin-bottom: 28px; }
    .login-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
    .login-field { flex: 1; min-width: 180px; }
    .login-field label {
      display: block; font-size: .72rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }
    .login-field input {
      width: 100%; padding: 9px 12px; border-radius: 8px;

      border-radius: 10px; background: rgba(165,180,255,.05); margin-bottom: 20px;

    .player-card.visible { display: flex; }
    .player-card-name { font-weight: 700; font-size: .9rem; }

    .player-card-logout:hover { color: var(--ink); }
    .comment-composer { display: none; margin-bottom: 28px; }

    .comment-composer textarea {

      border-radius: 8px; border: 1px solid var(--border);
      background: rgba(0,0,0,.3); color: var(--ink);
      font: inherit; font-size: .9rem; resize: vertical; outline: none;
      transition: border-color .15s; margin-bottom: 8px;

    .comment-composer textarea:focus { border-color: rgba(165,180,255,.4); }
    .comment-composer textarea::placeholder { color: rgba(185,195,255,.35); }
    .composer-footer { display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
    .char-count { font-size: .72rem; color: var(--muted); }
    .char-count.warn { color: #fca5a5; }
    .comments-list { display: flex; flex-direction: column; gap: 16px; }
    .comment-item { display: flex; gap: 12px; align-items: flex-start; }
    .comment-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--bg2); border: 1px solid rgba(255,255,255,.1);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; color: var(--accent);
    }
    .comment-bubble { flex: 1; min-width: 0; }
    .comment-meta {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 4px; flex-wrap: wrap;
    }
    .comment-name { font-weight: 700; font-size: .85rem; }
    .comment-time { font-size: .72rem; color: var(--muted); }
    .translate-btn {
      font-size: .68rem; color: var(--muted);
      background: none; border: none; cursor: pointer;
      padding: 0; text-decoration: none;
      transition: color .12s;
    }
    .translate-btn:hover { color: var(--ink); }
    .comment-text { font-size: .88rem; line-height: 1.55; color: var(--ink); word-break: break-word; }
    .comments-empty { text-align: center; padding: 28px 0; color: var(--muted); font-size: .88rem; }
    .comments-loading { text-align: center; padding: 20px 0; color: var(--muted); font-size: .85rem; }
    .error-msg { color: #fca5a5; font-size: .82rem; margin-top: 6px; }

    /* === Related === */
    .related-section { margin-bottom: 48px; }
    .related-heading {
      font-size: .72rem; font-weight: 800; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted); margin: 0 0 16px;
    }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 12px; }
    .related-card {
      display: block; border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; background: var(--card-bg);
      text-decoration: none; color: var(--ink);
      transition: border-color .15s, transform .15s;
    }
    .related-card:hover { border-color: rgba(165,180,255,.25); transform: translateY(-2px); text-decoration: none; color: var(--ink); }
    .related-card img { width: 100%; height: 120px; object-fit: cover; background: #000; display: block; }
    .related-card-body { padding: 10px 12px; }
    .related-card-title {
      font-size: .85rem; font-weight: 700; line-height: 1.35; margin: 0 0 4px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .related-card-date { font-size: .72rem; color: var(--muted); }

    .not-found { text-align: center; padding: 80px 20px; color: var(--muted); }
    .not-found h1 { color: var(--ink); font-size: 2rem; margin-bottom: 12px; }
    @keyframes shimmer { 0% { background-position: -600px 0; } 100% { background-position: 600px 0; } }
    .skeleton {
      background: linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);
      background-size: 600px 100%; animation: shimmer 1.4s infinite; border-radius: 6px;
    }
    .skel-img { width: 100%; height: 360px; border-radius: 14px; margin-bottom: 28px; }
    .skel-tag { height: 20px; width: 60px; border-radius: 999px; }
    .skel-h1 { height: 36px; margin: 14px 0 10px; border-radius: 8px; }
    .skel-h1-2 { height: 36px; width: 70%; border-radius: 8px; margin-bottom: 16px; }
    .skel-by { height: 16px; width: 220px; border-radius: 4px; margin-bottom: 28px; }

    @media (max-width: 600px) {
      .article-hero { max-height: 260px; }
      .comments-section { padding: 16px; }
    }
  </style>

  <script>
  (function() {
    var SUPABASE_URL = 'https://pfjepcvqvsloasdhjukp.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmamVwY3ZxdnNsb2FzZGhqdWtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjQ0NTEsImV4cCI6MjA5MjkwMDQ1MX0.2gRdJ4hP_osVLrv38aZYLQ-QeioRwdBNAYcK_Kdc40s';
    var MAX_COMMENT = 500;

    var articleId   = null;
    var allNews     = [];
    var currentUser = null;

    function qs(sel, ctx) { return (ctx || document).querySelector(sel); }

    function formatDate(iso) {
      var d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
    }

    function timeAgo(iso) {
      var diff = Date.now() - new Date(iso).getTime();
      var m = Math.floor(diff / 60000);
      if (m < 1)  return 'just now';
      if (m < 60) return m + 'm ago';
      var h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function initial(name) { return name ? name.charAt(0).toUpperCase() : '?'; }

    function translateUrl(text) {
      return 'https://translate.google.com/?sl=auto&tl=en&text=' + encodeURIComponent(text) + '&op=translate';
    }

    function saveSession(user) { try { localStorage.setItem('wos_commenter', JSON.stringify(user)); } catch(e){} }
    function loadSession()     { try { var s = localStorage.getItem('wos_commenter'); return s ? JSON.parse(s) : null; } catch(e){ return null; } }
    function clearSession()    { try { localStorage.removeItem('wos_commenter'); } catch(e){} }

    function loadComments(aid) {
      var list = qs('#comments-list');
      if (!list) return;
      list.innerHTML = '<div class="comments-loading" aria-live="polite">Loading comments…</div>';

      fetch(SUPABASE_URL + '/rest/v1/comments?article_id=eq.' + encodeURIComponent(aid) + '&order=created_at.asc', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      })
      .then(function(r){ return r.json(); })
      .then(function(comments) {
        if (!comments.length) {
          list.innerHTML = '<div class="comments-empty">No comments yet. Be the first!</div>';
          return;
        }
        list.innerHTML = comments.map(function(c) {
          return '<div class="comment-item" role="article" aria-label="Comment by ' + escHtml(c.username) + '">'
            + '<div class="comment-avatar" aria-hidden="true">' + escHtml(initial(c.username)) + '</div>'
            + '<div class="comment-bubble">'
            + '<div class="comment-meta">'
            + '<span class="comment-name">' + escHtml(c.username) + '</span>'
            + '<time class="comment-time" datetime="' + escHtml(c.created_at) + '">' + timeAgo(c.created_at) + '</time>'
            + '<a class="translate-btn" href="' + translateUrl(c.comment) + '" target="_blank" rel="noopener" aria-label="Translate this comment">🌐</a>'
            + '</div>'
            + '<p class="comment-text">' + escHtml(c.comment) + '</p>'
            + '</div></div>';
        }).join('');
      })
      .catch(function() {
        list.innerHTML = '<div class="error-msg">Could not load comments. Try refreshing.</div>';
      });
    }

    function postComment(comment) {
      return fetch(SUPABASE_URL + '/rest/v1/comments', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          article_id: articleId,
          player_id:  'anon-' + currentUser.username.toLowerCase().replace(/\s+/g,'-'),
          username:   currentUser.username,
          avatar_url: null,
          comment:    comment
        })
      }).then(function(r){ if (!r.ok) throw new Error(); });
    }

    function showPlayerCard(user) {
      var card     = qs('#player-card');
      var login    = qs('#comment-login');
      var composer = qs('#comment-composer');
      if (!card) return;
      qs('#player-name', card).textContent = user.username;
      qs('#player-initial', card).textContent = initial(user.username);
      card.classList.add('visible');
      if (login)    login.style.display = 'none';
      if (composer) composer.classList.add('visible');
    }

    function buildComments() {
      return '<section class="comments-section" aria-labelledby="comments-heading">'
        + '<h2 class="section-heading" id="comments-heading">Comments</h2>'
        + '<div id="comment-login" class="comment-login">'
        + '<p style="font-size:.85rem;color:var(--muted);margin:0 0 12px">Enter your in-game name to comment. No password needed.</p>'
        + '<div class="login-row">'
        + '<div class="login-field">'
        + '<label for="username-input">Your in-game name</label>'
        + '<input type="text" id="username-input" placeholder="e.g. DWHALESLAUGHTER" autocomplete="off" aria-describedby="login-error" maxlength="40" />'
        + '</div>'
        + '<button class="btn-primary" id="login-btn" type="button">Let\'s go</button>'
        + '</div>'
        + '<div id="login-error" class="error-msg" role="alert" aria-live="polite"></div>'
        + '</div>'
        + '<div id="player-card" class="player-card" aria-label="Commenting as">'
        + '<div class="comment-avatar" id="player-initial" aria-hidden="true">?</div>'
        + '<div class="player-card-name" id="player-name"></div>'
        + '<button class="player-card-logout" id="logout-btn" type="button">Not you?</button>'
        + '</div>'
        + '<div id="comment-composer" class="comment-composer" aria-label="Write a comment">'
        + '<label for="comment-textarea" style="display:block;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Your comment</label>'
        + '<textarea id="comment-textarea" placeholder="Say something about this article…" maxlength="' + MAX_COMMENT + '" aria-describedby="char-count post-error"></textarea>'
        + '<div class="composer-footer">'
        + '<span id="char-count" class="char-count" aria-live="polite">' + MAX_COMMENT + ' remaining</span>'
        + '<button class="btn-primary" id="post-btn" type="button">Post</button>'
        + '</div>'
        + '<div id="post-error" class="error-msg" role="alert" aria-live="polite"></div>'
        + '</div>'
        + '<div id="comments-list" class="comments-list" aria-label="Comments" aria-live="polite">'
        + '<div class="comments-loading">Loading comments…</div>'
        + '</div>'
        + '</section>';
    }

    function wireComments() {
      var loginBtn   = qs('#login-btn');
      var loginInput = qs('#username-input');
      var loginError = qs('#login-error');

      if (loginBtn) {
        loginBtn.addEventListener('click', function() {
          var name = loginInput.value.trim();
          if (!name) { loginError.textContent = 'Please enter your in-game name.'; return; }
          currentUser = { username: name };
          saveSession(currentUser);
          showPlayerCard(currentUser);
        });
        loginInput.addEventListener('keydown', function(e){ if (e.key === 'Enter') loginBtn.click(); });
      }

      var logoutBtn = qs('#logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', function() {
          currentUser = null;
          clearSession();
          qs('#player-card').classList.remove('visible');
          qs('#comment-composer').classList.remove('visible');
          qs('#comment-login').style.display = '';
          loginInput.value = '';
        });
      }

      var textarea  = qs('#comment-textarea');
      var charCount = qs('#char-count');
      if (textarea && charCount) {
        textarea.addEventListener('input', function() {
          var rem = MAX_COMMENT - textarea.value.length;
          charCount.textContent = rem + ' remaining';
          charCount.classList.toggle('warn', rem < 50);
        });
      }

      var postBtn   = qs('#post-btn');
      var postError = qs('#post-error');
      if (postBtn) {
        postBtn.addEventListener('click', function() {
          var text = textarea.value.trim();
          if (!text) { postError.textContent = 'Write something first!'; return; }
          if (!currentUser) { postError.textContent = 'Please enter your name first.'; return; }
          postBtn.disabled = true;
          postBtn.textContent = 'Posting…';
          postError.textContent = '';
          postComment(text)
            .then(function() {
              textarea.value = '';
              charCount.textContent = MAX_COMMENT + ' remaining';
              charCount.classList.remove('warn');
              loadComments(articleId);
            })
            .catch(function() {
              postError.textContent = 'Failed to post. Try again.';
            })
            .finally(function() {
              postBtn.disabled = false;
              postBtn.textContent = 'Post';
            });
        });
      }

      var saved = loadSession();
      if (saved) { currentUser = saved; showPlayerCard(saved); }
    }

    function getRelated(article, all) {
      var tags = {}, alliances = {}, chars = {};
      (article.tags || []).forEach(function(t){ tags[t] = 1; });
      (article.alliances || []).forEach(function(a){ alliances[a] = 1; });
      (article.characters || []).forEach(function(c){ chars[c] = 1; });
      return all
        .filter(function(n){ return n.id !== article.id; })
        .map(function(n) {
          var score = 0;
          (n.tags || []).forEach(function(t){ if (tags[t]) score += 2; });
          (n.alliances || []).forEach(function(a){ if (alliances[a]) score += 3; });
          (n.characters || []).forEach(function(c){ if (chars[c]) score += 4; });
          return { n: n, score: score };
        })
        .filter(function(x){ return x.score > 0; })
        .sort(function(a,b){ return b.score - a.score; })
        .slice(0, 3)
        .map(function(x){ return x.n; });
    }

    function renderArticle(article, related) {
      document.title = article.title + ' — WOS State 2128';

      var tagsHtml = [
        (article.alliances || []).map(function(a){ return '<span class="tag alliance">' + escHtml(a) + '</span>'; }).join(''),
        (article.tags || []).map(function(t){ return '<span class="tag">' + escHtml(t) + '</span>'; }).join('')
      ].join('');

      var relatedHtml = '';
      if (related.length) {
        relatedHtml = '<section class="related-section" aria-labelledby="related-heading">'
          + '<h2 class="related-heading" id="related-heading">Related Stories</h2>'
          + '<div class="related-grid">'
          + related.map(function(r) {
            return '<a class="related-card" href="/article.html?id=' + encodeURIComponent(r.id) + '" aria-label="' + escHtml(r.title) + '">'
              + (r.img ? '<img src="' + escHtml(r.img) + '" alt="' + escHtml(r.alt||'') + '" loading="lazy">' : '')
              + '<div class="related-card-body">'
              + '<div class="related-card-title">' + escHtml(r.title) + '</div>'
              + '<div class="related-card-date">' + formatDate(r.date) + '</div>'
              + '</div></a>';
          }).join('')
          + '</div></section>';
      }

      qs('#article-root').innerHTML =
        '<a href="/index.html" class="back-link">Back to home</a>'
        + '<article aria-labelledby="article-title">'
        + (article.img ? '<img class="article-hero" src="' + escHtml(article.img) + '" alt="' + escHtml(article.alt||'') + '" fetchpriority="high">' : '')
        + '<header class="article-header">'
        + (tagsHtml ? '<div class="article-tags" aria-label="Tags">' + tagsHtml + '</div>' : '')
        + '<h1 class="article-title" id="article-title">' + escHtml(article.title) + '</h1>'
        + '<div class="article-byline">'
        + '<span>By <span class="reporter">' + escHtml(article.reporter) + '</span></span>'
        + '<span class="sep">·</span>'
        + '<time datetime="' + escHtml(article.date) + '">' + formatDate(article.date) + '</time>'
        + '</div>'
        + '</header>'
        + '<div class="article-body">' + article.blurb + '</div>'
        + '</article>'
        + '<div class="share-wrap">'
        + '<button class="share-btn" id="share-btn" type="button">&#128279; Share this article</button>'
        + '</div>'
        + buildComments()
        + relatedHtml;

      var shareBtn = qs('#share-btn');
      shareBtn.addEventListener('click', function() {
        if (navigator.share) {
          navigator.share({
            title: article.title,
            text: article.title + ' — WOS State 2128',
            url: window.location.href
          }).catch(function(){});
        } else {
          navigator.clipboard.writeText(window.location.href).then(function() {
            shareBtn.textContent = '✓ Link copied!';
            shareBtn.classList.add('copied');
            setTimeout(function(){ shareBtn.innerHTML = '&#128279; Share this article'; shareBtn.classList.remove('copied'); }, 2000);
          });
        }
      });

      wireComments();
      loadComments(articleId);
    }

    var params = new URLSearchParams(window.location.search);
    articleId  = params.get('id');

    if (!articleId) {
      qs('#skeleton').style.display = 'none';
      qs('#article-root').innerHTML = '<div class="not-found"><h1>Article not found</h1><p>No article ID specified. <a href="/index.html">Return home</a>.</p></div>';
    } else {
      fetch('/news.json')
        .then(function(r){ return r.json(); })
        .then(function(data) {
          allNews = data;
          var article = data.filter(function(n){ return n.id === articleId; })[0];
          qs('#skeleton').style.display = 'none';
          if (!article) {
            qs('#article-root').innerHTML = '<div class="not-found"><h1>Article not found</h1><p>We couldn\'t find that story. <a href="/index.html">Return home</a>.</p></div>';
            return;
          }
          renderArticle(article, getRelated(article, allNews));
        })
        .catch(function() {
          qs('#skeleton').style.display = 'none';
          qs('#article-root').innerHTML = '<div class="not-found"><h1>Something went wrong</h1><p>Couldn\'t load articles. <a href="/index.html">Return home</a>.</p></div>';
        });
    }
  })();
  </script>

</body>
</html>
