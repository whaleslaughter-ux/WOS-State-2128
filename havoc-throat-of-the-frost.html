<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6LN9JCF6JC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6LN9JCF6JC');
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HAVOC! Throat of the Frost — WOS State 2128</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: #eef2ff;
      font: 16px/1.6 ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, Roboto, "Noto Sans", Arial;
      background: radial-gradient(1100px 560px at 50% -10%, #1e3a8a 0%, #0f172a 42%, #020617 100%);
      background-attachment: fixed;
      padding-top: 120px;
    }

    .wrap {
      width: min(1000px, 95%);
      margin: 0 auto;
      padding: 40px 20px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    header h1 {
      margin: 0 0 .4rem;
      font-size: clamp(1.6rem, 1.8vw + 1rem, 2.5rem);
      letter-spacing: .6px;
      text-transform: uppercase;
      color: #fff;
    }

    header p {
      margin: 0;
      font-size: 1rem;
      opacity: .9;
      color: #b9c3ff;
    }

    .player-shell {
      max-width: 640px;
      margin: 2rem auto 2.5rem;
      padding: 24px 24px 28px;
      border-radius: 24px;
      background: radial-gradient(circle at top, rgba(15,23,42,.96), rgba(2,6,23,1));
      box-shadow: 0 22px 60px rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .player-shell iframe {
      width: 100%;
      border-radius: 12px;
      border: 0;
      display: block;
    }

    .player-note {
      margin-top: .75rem;
      font-size: .9rem;
      opacity: .85;
      text-align: center;
    }

    .player-note a {
      color: #a5b4ff;
      text-decoration: underline;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      max-width: 640px;
      margin: 0 auto 3rem;
    }

    .out-button {
      display: block;
      padding: 14px 16px;
      border-radius: 14px;
      text-align: center;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: .3px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
      transition: transform .15s ease, opacity .15s ease;
    }

    .out-button:hover {
      transform: translateY(-2px);
      opacity: .95;
    }

    .out-button.secondary {
      background: linear-gradient(135deg, #0ea5e9, #2dd4bf);
    }

    .out-button.ghost {
      background: linear-gradient(135deg, #475569, #1f2933);
      color: #9ca3af;
    }

    footer {
      text-align: center;
      margin: 34px 0;
      color: #b9c3ff;
      opacity: .8;
      font-size: .9rem;
    }
  </style>
</head>

<body class="album-drop">

  <div id="nav-placeholder"></div>
  <script>
    fetch('/nav.html')
      .then(r => r.text())
      .then(h => { document.getElementById('nav-placeholder').innerHTML = h; });
  </script>

  <main id="main" class="wrap">
    <header>
      <h1>HAVOC! Throat of the Frost</h1>
      <p>The official metal chronicle of the State 2128 blizzards. Listen or be left in the snow.</p>
    </header>

    <section class="player-shell" aria-label="Spotify player">
      <iframe
        src="https://open.spotify.com/embed/album/35XlO6DqN66oA4vOltM098"
        width="100%"
        height="352"
        style="border-radius:12px"
        frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
      </iframe>

      <p class="player-note">
        For the full sub-zero experience, open this in
        <a href="https://open.spotify.com/album/35XlO6DqN66oA4vOltM098" target="_blank" rel="noopener noreferrer">
          Spotify
        </a>.
      </p>
    </section>

    <section class="button-row" aria-label="Listen on other platforms">
      <a class="out-button" href="https://suno.com/playlist/4b182548-7dd7-42e2-8a57-a8d594f0fa69" target="_blank" rel="noopener noreferrer">
        Suno Playlist
      </a>

      <a class="out-button secondary" href="https://music.apple.com/us/artist/whaleslaughter/1847094318" target="_blank" rel="noopener noreferrer">
        Apple Music
      </a>

      <a class="out-button ghost" href="#" aria-disabled="true">
        YouTube (coming soon)
      </a>
    </section>
  </main>

  <div id="footer-placeholder"></div>
  <script>
    fetch('/footer.html')
      .then(r => r.text())
      .then(h => { document.getElementById('footer-placeholder').innerHTML = h; });
  </script>

</body>
</html>
